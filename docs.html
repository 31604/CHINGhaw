<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documentation — IndustriaOS IoT Platform</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "Fira Code", "monospace"],
          },
          colors: {
            brand: { blue: "#3b9eff" },
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 99px; }
  </style>
</head>

<body class="bg-slate-950 text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

  <!-- ── Top bar ── -->
  <header class="flex-shrink-0 h-12 flex items-center justify-between px-5
                 border-b border-white/5 bg-slate-900/80 backdrop-blur-md">

    <div class="flex items-center gap-3">
      <!-- Back button -->
      <a href="index.html"
         class="inline-flex items-center gap-1.5 text-xs font-medium text-slate-400
                hover:text-slate-100 border border-slate-700 hover:border-slate-500
                px-2.5 py-1.5 rounded-md transition-all duration-150">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
        Back
      </a>

      <div class="w-px h-4 bg-slate-700"></div>

      <!-- Brand -->
      <span class="text-brand-blue">
        <i data-lucide="cpu" class="w-4 h-4"></i>
      </span>
      <span class="font-semibold text-sm tracking-tight text-slate-100">IndustriaOS</span>
      <span class="hidden sm:inline font-mono text-[10px] text-slate-500">/</span>
      <span class="hidden sm:inline font-mono text-[10px] text-slate-400 uppercase tracking-widest">Documentation</span>
    </div>

    <!-- Open in new tab -->
    <a href="partie%20help.pdf"
       target="_blank"
       rel="noopener"
       class="inline-flex items-center gap-1.5 text-xs font-medium text-brand-blue
              border border-brand-blue/25 bg-brand-blue/10
              hover:bg-brand-blue/20 hover:border-brand-blue/50
              px-3 py-1.5 rounded-md transition-all duration-150">
      <i data-lucide="external-link" class="w-3.5 h-3.5"></i>
      Open in new tab
    </a>
  </header>

  <!-- ── PDF viewer ── -->
  <main class="flex-1 overflow-hidden">
    <iframe
      id="pdf-frame"
      src="partie%20help.pdf"
      class="w-full h-full border-0"
      title="IndustriaOS Technical Documentation"
    ></iframe>

    <!-- Fallback shown if iframe blocked -->
    <noscript>
      <div class="flex flex-col items-center justify-center h-full gap-4 text-center px-6">
        <i data-lucide="file-x" class="w-12 h-12 text-slate-600"></i>
        <p class="text-slate-400 text-sm">Your browser blocked the embedded PDF viewer.</p>
        <a href="partie%20help.pdf" target="_blank"
           class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-brand-blue text-white text-sm font-medium hover:bg-blue-400 transition-all">
          <i data-lucide="download" class="w-4 h-4"></i>
          Open PDF directly
        </a>
      </div>
    </noscript>
  </main>

  <!-- Blocked-iframe fallback (shown via JS if iframe fails to load) -->
  <div id="fallback"
       class="hidden absolute inset-0 top-12 flex flex-col items-center justify-center gap-5 text-center px-6 bg-slate-950">
    <div class="w-16 h-16 rounded-2xl bg-brand-blue/10 border border-brand-blue/20 flex items-center justify-center text-brand-blue">
      <i data-lucide="file-text" class="w-8 h-8"></i>
    </div>
    <div>
      <p class="font-semibold text-slate-100 mb-1">Documentation PDF</p>
      <p class="text-sm text-slate-400 max-w-xs">
        Your browser cannot embed a local file. Click below to open it directly.
      </p>
    </div>
    <a href="partie%20help.pdf"
       target="_blank"
       rel="noopener"
       class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-brand-blue text-white text-sm font-semibold hover:bg-blue-400 transition-all">
      <i data-lucide="external-link" class="w-4 h-4"></i>
      Open partie help.pdf
    </a>
  </div>

  <script>
    lucide.createIcons();

    // If the iframe fails to load the local PDF, show the fallback CTA
    const frame    = document.getElementById("pdf-frame");
    const fallback = document.getElementById("fallback");

    frame.addEventListener("error", showFallback);

    // Chrome/Edge on file:// may not fire "error" — detect blank load after 3s
    setTimeout(() => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || doc.body.childElementCount === 0) showFallback();
      } catch {
        // cross-origin block means the file did load — do nothing
      }
    }, 3000);

    function showFallback() {
      frame.classList.add("hidden");
      fallback.classList.remove("hidden");
      lucide.createIcons();
    }
  </script>

</body>
</html>
